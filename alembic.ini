[alembic]
script_location = db
version_locations = db/migrations
# Overridden at runtime by LUPLO_DB_URL env var (see db/env.py).
# This fallback has no credentials — set LUPLO_DB_URL for real use.
sqlalchemy.url = postgresql+psycopg://localhost/luplo

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
